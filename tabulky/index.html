<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabulka</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Učíme sa tabulky</h1>
    </header>

    <main>
        <table>
            <caption>Dlžníci</caption>

            <tr>
                <th>Meno</th>
                <th>Priezvisko</th>
                <th>Vek</th>
                <th>Suma</th>
            </tr>

            <tr>
                <td>Janko</td>
                <td>Hrasko</td>
                <td>18</td>
                <td>50</td>
            </tr>

            <tr>
                <td>Milan</td>
                <td>Hruška</td>
                <td>17</td>
                <td>30</td>
            </tr>

            <tr>
                <td colspan="3">Spolu</td>
                <td>80</td>
            </tr>

        </table>

        <table>
            <caption>Zoznam krúžkov</caption>

            <tr>
                <th>Meno</th>
                <th>Krúžok</th>
            </tr>

            <tr>
                <td rowspan="2">Jano</td>
                <td>Futbal</td>
            </tr>

            <tr>
                <td>Volejbal</td>
            </tr>

            <tr>
                <td rowspan="3">Ďuro</td>
                <td>Futbal</td>
            </tr>

            <tr>
                <td>Programovanie</td>
            </tr>

            <tr>
                <td>Mladý účtovník</td>
            </tr>

        </table>





    </main>

    <footer>


    </footer>
    
</body>
</html>
